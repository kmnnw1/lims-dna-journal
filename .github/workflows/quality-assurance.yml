name: Quality Assurance

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - '**.md'
      - 'local/**'
      - '.gemini/**'
      - 'docs/**'
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - '**.md'
      - 'local/**'
      - '.gemini/**'
      - 'docs/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-check:
    runs-on: ubuntu-latest
    env:
      NEXT_TELEMETRY_DISABLED: 1
      PRISMA_TELEMETRY_DISABLED: 1
      DO_NOT_TRACK: 1
      HUSKY: 0
      npm_config_update_notifier: false
    steps:
      - uses: actions/checkout@v6
      - name: Cache npm dependencies
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-qa-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-qa-
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: corepack enable npm && corepack prepare npm@11.12.0 --activate
      - name: Install dependencies
        run: |
          echo "::group::npm ci"
          npm ci --no-update-notifier
          echo "::endgroup::"
      - name: Generate Prisma Client
        run: |
          echo "::group::prisma generate"
          npx prisma generate
          echo "::endgroup::"
      - name: Biome Lint
        run: npm run lint
      - name: TypeScript Check
        run: npm run check
      - name: Unit Tests
        run: npm test
