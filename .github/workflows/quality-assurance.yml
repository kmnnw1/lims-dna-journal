name: Quality Assurance

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint-and-check:
    runs-on: ubuntu-latest
    env:
      NEXT_TELEMETRY_DISABLED: 1
      PRISMA_TELEMETRY_DISABLED: 1
      DO_NOT_TRACK: 1
    steps:
      - uses: actions/checkout@v6
      - name: Cache npm dependencies
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-qa-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-qa-
      - uses: actions/setup-node@v7
        with:
          node-version: 26
      - run: corepack enable npm && corepack prepare npm@latest --activate
      - name: Install dependencies
        run: |
          echo "::group::npm ci"
          npm ci
          echo "::endgroup::"
      - name: Generate Prisma Client
        run: |
          echo "::group::prisma generate"
          npx prisma generate
          echo "::endgroup::"
      - name: Biome Lint
        run: npm run lint
      - name: TypeScript Check
        run: npm run check
      - name: Unit Tests
        run: npm test
