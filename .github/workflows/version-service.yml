name: Version Management Service

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - 'package.json'
      - 'package-lock.json'

permissions:
  contents: write

jobs:
  bump-version:
    runs-on: ubuntu-latest
    env:
      NEXT_TELEMETRY_DISABLED: 1
      PRISMA_TELEMETRY_DISABLED: 1
      DO_NOT_TRACK: 1
    if: "!contains(github.event.head_commit.message, 'chore: bump version')"
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Cache npm dependencies
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-versioning-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-versioning-

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: |
          echo "::group::npm ci"
          npm ci
          echo "::endgroup::"

      - name: Generate Prisma Client
        run: |
          echo "::group::prisma generate"
          npx prisma generate
          echo "::endgroup::"

      - name: Bump Version
        run: npx tsx scripts/bump-version.ts
      
      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git status
          git commit -m "chore: bump version [skip ci]" || echo "No changes to commit"
          git push
