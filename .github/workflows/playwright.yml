name: Playwright Tests
on:
    push:
        branches: [main, master]
    pull_request:
        branches: [main, master]
jobs:
    test:
        timeout-minutes: 60
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 22
            - name: Install dependencies
              run: npm install --force
            - name: Clean broken apt repos before playwright install
              run: sudo rm -f /etc/apt/sources.list.d/*.list || true
            - name: Install Playwright Browsers
              run: npx playwright install --with-deps
            - name: Generate Prisma Client
              run: npx prisma generate
            - name: Setup Database and Environment
              run: |
                  echo "NEXTAUTH_SECRET=test_super_secret_key_for_github_actions_32" >> .env
                  echo "NEXTAUTH_URL=http://127.0.0.1:3000" >> .env
                  echo "DATABASE_URL=file:./prisma/dev.db" >> .env
                  echo "AUTH_TEST_TOKEN=test-token-123" >> .env
                  npx prisma db push
                  npx tsx scripts/fix-auth.ts
            - name: Build application
              run: |
                  npm run build
                  cp -r public .next/standalone/public || true
                  mkdir -p .next/standalone/.next/static
                  cp -r .next/static .next/standalone/.next/static || true

            - name: Run Playwright tests
              run: npx playwright test
              env:
                  TEST_TOKEN: test-token-123
                  AUTH_TEST_TOKEN: test-token-123
                  DATABASE_URL: file:./prisma/dev.db

            - uses: actions/upload-artifact@v4
              if: ${{ !cancelled() }}
              with:
                  name: playwright-report
                  path: playwright-report/
                  retention-days: 30
