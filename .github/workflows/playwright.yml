name: Playwright Tests
on:
    push:
        branches: [main, master]
    pull_request:
        branches: [main, master]
jobs:
    test:
        timeout-minutes: 60
        runs-on: ubuntu-latest
        env:
            NEXT_TELEMETRY_DISABLED: 1
            PRISMA_TELEMETRY_DISABLED: 1
            DO_NOT_TRACK: 1
        steps:
            - uses: actions/checkout@v6
            - name: Cache npm dependencies
              uses: actions/cache@v5
              with:
                path: ~/.npm
                key: ${{ runner.os }}-node-playwright-${{ hashFiles('**/package-lock.json') }}
                restore-keys: |
                  ${{ runner.os }}-node-playwright-
            - uses: actions/setup-node@v6
              with:
                  node-version: 24
            - run: corepack enable npm && corepack prepare npm@latest --activate
            - name: Install dependencies
              run: |
                echo "::group::npm install"
                npm install --force
                echo "::endgroup::"
            - name: Clean broken apt repos before playwright install
              run: sudo rm -f /etc/apt/sources.list.d/*.list || true
            - name: Install Playwright Browsers
              run: |
                echo "::group::playwright install"
                npx playwright install --with-deps
                echo "::endgroup::"
            - name: Generate Prisma Client
              run: |
                echo "::group::prisma generate"
                npx prisma generate
                echo "::endgroup::"
            - name: Setup Database and Environment
              run: |
                  CI_SECRET=$(openssl rand -base64 32)
                  CI_TOKEN=$(openssl rand -hex 16)
                  echo "NEXTAUTH_SECRET=${CI_SECRET}" >> .env
                  echo "NEXTAUTH_URL=http://127.0.0.1:3000" >> .env
                  echo "DATABASE_URL=file:./prisma/dev.db" >> .env
                  echo "AUTH_TEST_TOKEN=${CI_TOKEN}" >> .env
                  echo "CI_TOKEN=${CI_TOKEN}" >> "$GITHUB_ENV"
                  npx prisma db push
                  npx tsx scripts/fix-auth.ts
            - name: Build application
              run: |
                  npm run build
                  cp -r public .next/standalone/public || true
                  mkdir -p .next/standalone/.next/static
                  cp -r .next/static .next/standalone/.next/static || true

            - name: Run Playwright tests
              run: npx playwright test
              env:
                  TEST_TOKEN: ${{ env.CI_TOKEN }}
                  AUTH_TEST_TOKEN: ${{ env.CI_TOKEN }}
                  DATABASE_URL: file:./prisma/dev.db

            - uses: actions/upload-artifact@v6
              if: ${{ !cancelled() }}
              with:
                  name: playwright-report
                  path: playwright-report/
                  retention-days: 30
