name: Playwright Tests
on:
    push:
        branches: [main, master]
        paths-ignore:
            - '**.md'
            - 'local/**'
            - '.gemini/**'
            - 'docs/**'
    pull_request:
        branches: [main, master]
        paths-ignore:
            - '**.md'
            - 'local/**'
            - '.gemini/**'
            - 'docs/**'

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    test:
        timeout-minutes: 60
        runs-on: ubuntu-latest
        env:
            NEXT_TELEMETRY_DISABLED: 1
            PRISMA_TELEMETRY_DISABLED: 1
            DO_NOT_TRACK: 1
            HUSKY: 0
            npm_config_update_notifier: false
        steps:
            - uses: actions/checkout@v6
            - name: Cache npm dependencies
              uses: actions/cache@v5
              with:
                path: ~/.npm
                key: ${{ runner.os }}-node-v2-${{ hashFiles('**/package-lock.json') }}
                restore-keys: |
                  ${{ runner.os }}-node-v2-
            - uses: actions/setup-node@v6
              with:
                  node-version: 24
            - run: corepack enable npm && corepack prepare npm@11.12.0 --activate
            - name: Install dependencies
              run: |
                echo "::group::npm ci"
                npm ci --no-update-notifier
                echo "::endgroup::"
            - name: Get Playwright version
              id: playwright-version
              run: echo "PLAYWRIGHT_VERSION=$(node -e "console.log(require('./package-lock.json').packages['node_modules/@playwright/test'].version)")" >> "$GITHUB_OUTPUT"
            - name: Cache Playwright Browsers
              uses: actions/cache@v5
              id: playwright-cache
              with:
                path: ~/.cache/ms-playwright
                key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.PLAYWRIGHT_VERSION }}
            - name: Install Playwright Browsers
              if: steps.playwright-cache.outputs.cache-hit != 'true'
              run: |
                echo "::group::playwright install"
                npx playwright install --with-deps chromium
                echo "::endgroup::"
            - name: Generate Prisma Client
              run: |
                echo "::group::prisma generate"
                npx prisma generate
                echo "::endgroup::"
            - name: Setup Database and Environment
              run: |
                  CI_SECRET=$(openssl rand -base64 32)
                  CI_TOKEN=$(openssl rand -hex 16)
                  echo "NEXTAUTH_SECRET=${CI_SECRET}" >> .env
                  echo "NEXTAUTH_URL=http://127.0.0.1:3000" >> .env
                  echo "DATABASE_URL=file:./prisma/dev.db" >> .env
                  echo "AUTH_TEST_TOKEN=${CI_TOKEN}" >> .env
                  
                  # Export to GitHub Env for the Next.js standalone process
                  echo "NEXTAUTH_SECRET=${CI_SECRET}" >> "$GITHUB_ENV"
                  echo "NEXTAUTH_URL=http://127.0.0.1:3000" >> "$GITHUB_ENV"
                  echo "AUTH_TEST_TOKEN=${CI_TOKEN}" >> "$GITHUB_ENV"
                  echo "CI_TOKEN=${CI_TOKEN}" >> "$GITHUB_ENV"
                  
                  npx prisma db push
                  AUTH_TEST_TOKEN=${CI_TOKEN} npx tsx scripts/fix-auth.ts
            - name: Build application
              run: |
                npm run build
                cp -r public .next/standalone/public
                cp -r .next/static .next/standalone/.next/static
              env:
                DATABASE_URL: file:./prisma/dev.db


            - name: Run Playwright tests
              run: TEST_TOKEN=$CI_TOKEN AUTH_TEST_TOKEN=$CI_TOKEN npx playwright test
              env:
                DATABASE_URL: file:./prisma/dev.db
                DEBUG: pw:webserver

            - uses: actions/upload-artifact@v6
              if: ${{ !cancelled() }}
              with:
                  name: playwright-report
                  path: playwright-report/
                  retention-days: 30
