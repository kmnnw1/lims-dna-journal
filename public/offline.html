<!doctype html>
<html lang="ru">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="theme-color" content="#fafdfb" />
		<title>Нет сети | Журнал ДНК</title>
		<link rel="icon" href="/icon.svg" type="image/svg+xml" />
		<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
		<meta name="description" content="Вы офлайн. Лабораторный журнал недоступен без сети." />
		<style>
			/* Базовые стили MD3 Expressive Light (вшиты для гарантии отображения без интернета) */
			* {
				box-sizing: border-box;
			}
			html,
			body {
				height: 100%;
				margin: 0;
				padding: 0;
				font-family:
					system-ui,
					-apple-system,
					'Segoe UI',
					Roboto,
					Helvetica,
					Arial,
					sans-serif;
				background-color: #fafdfb; /* Surface */
				color: #191c1b; /* On Surface */
				min-height: 100dvh;
				display: flex;
				align-items: center;
				justify-content: center;
			}
			.container {
				padding: 1.5rem;
				padding-bottom: max(1.5rem, env(safe-area-inset-bottom));
				width: 100%;
				display: flex;
				justify-content: center;
			}
			.card {
				max-width: 28rem;
				width: 100%;
				text-align: center;
				padding: 3rem 2rem 2.5rem 2rem;
				border-radius: 2.5rem; /* MD3 Extra Large */
				background-color: #f3f6f4; /* Surface Container Low */
				box-shadow:
					0 4px 6px -1px rgba(0, 0, 0, 0.1),
					0 24px 38px 3px rgba(0, 0, 0, 0.14); /* MD3 Elevation 3 */
				animation: slide-up 0.6s cubic-bezier(0.2, 0, 0, 1);
			}
			@keyframes slide-up {
				from {
					opacity: 0;
					transform: translateY(40px);
				}
				to {
					opacity: 1;
					transform: none;
				}
			}
			.icon-container {
				width: 5rem;
				height: 5rem;
				margin: 0 auto 1.5rem;
				border-radius: 1.5rem; /* MD3 Large */
				background-color: #74f8e5; /* Primary Container */
				color: #00201c; /* On Primary Container */
				display: flex;
				align-items: center;
				justify-content: center;
			}
			h1 {
				font-size: 2rem;
				margin: 0 0 1rem;
				font-weight: 400;
				letter-spacing: -0.02em;
			}
			p {
				margin: 0 0 1rem 0;
				color: #3f4947; /* On Surface Variant */
				font-size: 1.1rem;
				line-height: 1.5;
			}
			.tips {
				color: #6f7977; /* Outline */
				font-size: 0.9rem;
				margin-bottom: 2rem;
			}
			button {
				width: 100%;
				padding: 1.25rem 1.5rem;
				border-radius: 9999px; /* MD3 Fully Rounded */
				border: none;
				background-color: #006a60; /* Primary */
				color: #ffffff; /* On Primary */
				font-weight: 500;
				font-size: 1.1rem;
				cursor: pointer;
				transition: all 0.2s cubic-bezier(0.2, 0, 0, 1);
				outline: none;
			}
			button:active {
				transform: scale(0.96);
			}
			button:focus-visible {
				outline: 3px solid #006a60;
				outline-offset: 3px;
			}
			@media (prefers-color-scheme: dark) {
				body {
					background-color: #191c1b;
					color: #e0e3e1;
				}
				.card {
					background-color: #1c201f;
					box-shadow:
						0 8px 10px -5px rgba(0, 0, 0, 0.2),
						0 16px 24px 2px rgba(0, 0, 0, 0.14);
				}
				.icon-container {
					background-color: #005048;
					color: #74f8e5;
				}
				p {
					color: #bec9c6;
				}
				.tips {
					color: #899390;
				}
				button {
					background-color: #53dbc8;
					color: #003731;
				}
				button:focus-visible {
					outline-color: #53dbc8;
				}
			}
		</style>
		<script>
			// Авто-перезагрузка при появлении сети
			window.addEventListener('online', () => {
				setTimeout(() => location.reload(), 300);
			});
			function _vibrate() {
				if (navigator.vibrate)
					try {
						navigator.vibrate(20);
					} catch {}
			}
		</script>
	</head>
	<body>
		<div class="container">
			<div class="card" role="alert" aria-live="assertive">
				<div class="icon-container" aria-hidden="true">
					<svg
						width="40"
						height="40"
						fill="none"
						viewBox="0 0 24 24"
						stroke="currentColor"
						stroke-width="1.5">
						<path
							stroke-linecap="round"
							stroke-linejoin="round"
							d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 15c-.55 0-1-.45-1-1v-4c0-.55.45-1 1-1s1 .45 1 1v4c0 .55-.45 1-1 1zm1-8h-2V7h2v2z" />
					</svg>
				</div>
				<h1>Нет подключения</h1>
				<p>
					Кажется, вы сейчас находитесь офлайн.<br />
					Журнал ДНК требует активного соединения с сервером.
				</p>
				<div class="tips">
					Проверьте Wi-Fi или мобильный интернет. Страница обновится автоматически, когда
					сеть появится.
				</div>
				<button
					type="button"
					onclick="
						vibrate();
						location.reload();
					">
					Попробовать снова
				</button>
			</div>
		</div>
	</body>
</html>
