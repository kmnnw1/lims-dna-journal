<!doctype html>
<html lang="ru">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="theme-color" content="#0d9488" />
		<title>Нет сети — Журнал ДНК</title>
		<link rel="icon" href="/icon.svg" type="image/svg+xml" />
		<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
		<meta
			name="description"
			content="Вы офлайн. Журнал проб ДНК и ПЦР — прогрессивное лабораторное приложение." />
		<style>
			* {
				box-sizing: border-box;
			}
			html,
			body {
				height: 100%;
				margin: 0;
				padding: 0;
				font-family: ui-sans-serif, system-ui, 'Segoe UI', Arial, sans-serif;
				background: linear-gradient(164deg, #ecfdf5 0%, #e0f2f1 35%, #f4f4f5 100%);
				color: #18181b;
				min-height: 100dvh;
			}
			body {
				min-height: 100dvh;
				display: flex;
				align-items: center;
				justify-content: center;
				padding: 1.5rem;
				padding-bottom: max(1.5rem, env(safe-area-inset-bottom));
				transition: background 0.3s;
			}
			.card {
				max-width: 24rem;
				width: 100%;
				text-align: center;
				padding: 2.25rem 2rem 1.75rem 2rem;
				border-radius: 1.5rem;
				background: rgba(255, 255, 255, 0.96);
				border: 1.5px solid #e5e7eb;
				box-shadow:
					0 10px 48px 0 rgba(16, 180, 160, 0.14),
					0 2px 4px rgba(0, 0, 0, 0.03);
				backdrop-filter: blur(1.5px);
				animation: card-in 0.8s cubic-bezier(0.43, 0.16, 0.33, 1.1);
			}
			@keyframes card-in {
				from {
					opacity: 0;
					transform: translateY(32px) scale(0.97);
				}
				to {
					opacity: 1;
					transform: none;
				}
			}
			.icon {
				width: 3.3rem;
				height: 3.3rem;
				margin: 0 auto 1.15rem;
				border-radius: 0.9rem;
				background: linear-gradient(134deg, #14b8a6 60%, #047857 100%);
				display: flex;
				align-items: center;
				justify-content: center;
				color: #fff;
				font-size: 2rem;
				box-shadow: 0 2px 10px 0 rgba(20, 184, 166, 0.09);
				border: 1.2px solid #ccfbf1;
				transition: background 0.6s;
			}
			h1 {
				font-size: 1.35rem;
				margin: 0 0 0.7rem;
				font-weight: 700;
				color: #0f766e;
				letter-spacing: 0.01em;
			}
			p {
				margin: 0 0 0.7rem 0;
				color: #475569;
				font-size: 1rem;
				line-height: 1.6;
			}
			.tips {
				color: #9ca3af;
				font-size: 0.83rem;
				margin-bottom: 0.3rem;
				margin-top: 0.3rem;
			}
			button {
				margin-top: 1.5rem;
				width: 100%;
				padding: 0.85rem 1.2rem;
				border-radius: 0.8rem;
				border: none;
				background: linear-gradient(90deg, #0d9488 60%, #0f766e 100%);
				color: white;
				font-weight: 700;
				font-size: 1rem;
				letter-spacing: 0.03em;
				box-shadow: 0 2px 8px rgba(14, 188, 160, 0.13);
				cursor: pointer;
				transition:
					background 0.18s,
					transform 0.07s;
				outline: none;
			}
			button:active {
				transform: scale(0.98);
				filter: brightness(1.02);
			}
			button:focus-visible {
				outline: 2px solid #14b8a6;
				outline-offset: 2px;
			}
			@media (max-width: 500px) {
				.card {
					max-width: 99vw;
					padding: 1.1rem 0.5rem 1.1rem 0.5rem;
				}
				h1 {
					font-size: 1.05rem;
				}
			}
		</style>
		<script>
			// Предлагаем войти снова в онлайн при появлении соединения
			window.addEventListener('online', () => {
				document.body.classList.add('online');
				setTimeout(() => location.reload(), 300);
			});
			// Тонкая вибро-обратная связь для кнопки (если поддерживается)
			function vibrate(ms = 22) {
				if (window.navigator?.vibrate)
					try {
						window.navigator.vibrate(ms);
					} catch {}
			}
		</script>
	</head>
	<body>
		<div class="card" role="alert" aria-live="assertive">
			<div class="icon" aria-hidden="true" title="Лаборатория">
				<svg
					width="34"
					height="34"
					fill="none"
					viewBox="0 0 44 44"
					aria-hidden="true"
					style="display: block">
					<rect width="44" height="44" rx="10" fill="url(#a)"></rect>
					<g>
						<path
							d="M15 13.5V23.1c0 1.63-.46 3.23-1.34 4.6l-2.23 3.47A5 5 0 0 0 15.6 38h12.8a5 5 0 0 0 4.17-6.83l-2.22-3.47A8.3 8.3 0 0 1 29 23.1V13.5h-2.5V8.62a2.5 2.5 0 1 0-5 0V13.5H15z"
							fill="#fff"
							opacity=".86" />
						<ellipse cx="22" cy="26.8" rx="3.8" ry="2" fill="#2dd4bf" opacity=".84" />
						<rect x="19.8" y="9.2" width="4.4" height="2.3" rx="1.15" fill="#a7f3d0" />
					</g>
					<defs>
						<linearGradient
							id="a"
							x1="0"
							y1="0"
							x2="44"
							y2="44"
							gradientUnits="userSpaceOnUse">
							<stop stop-color="#14b8a6" />
							<stop offset="1" stop-color="#047857" />
						</linearGradient>
					</defs>
				</svg>
			</div>
			<h1>Вы вне сети</h1>
			<p>
				Нет подключения к интернету.<br />
				Попробуйте исправить проблему и обновить страницу, как снова появится сеть.
			</p>
			<div class="tips">
				Проверьте Wi‑Fi или мобильные данные.<br />
				Можно открыть журнал позже — офлайн данные сохраняются.
			</div>
			<button
				type="button"
				onclick="
					vibrate(18);
					location.reload();
				">
				↺ Попробовать снова
			</button>
		</div>
	</body>
</html>
